<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفاجأة لرويدا ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    text-align:center;
}

.box{
    background:#fff;
    padding:30px;
    border-radius:20px;
    width:85%;
    max-width:420px;
    box-shadow:0 0 20px rgba(0,0,0,.2);
}

h1{
    color:#ff4081;
}

#countdown{
    font-size:55px;
    font-weight:bold;
    color:#ff4081;
    margin:20px 0;
}

#message{
    font-size:20px;
    color:#444;
    line-height:1.8;
}
</style>
</head>

<body>

<div class="box">

<h1>💖 مفاجأة لرويدا 💖</h1>

<p>باقي على المفاجأة...</p>

<div id="countdown">20</div>

<div id="message"></div>

</div>

<script>

let time = 20;

let timer = setInterval(function(){

document.getElementById("countdown").innerHTML = time;

time--;

if(time < 0){

clearInterval(timer);

document.getElementById("countdown").innerHTML="🎉";

document.getElementById("message").innerHTML=
"🌹 صباح الخير يا رويدا ❤️<br><br>أتمنى يكون يومك جميل مثل ابتسامتك.<br><br>أحبك أكثر مما تتخيلين. 🤍";

}

},1000);

</script>

</body>
</html>
