<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفاجأة لرويدا ❤️</title>

<style>
body{
margin:0;
padding:0;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
text-align:center;
}

.box{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.2);
width:85%;
max-width:400px;
}

#countdown{
font-size:40px;
color:#ff4d88;
font-weight:bold;
margin:20px 0;
}

#message{
margin-top:20px;
font-size:20px;
color:#444;
}
</style>

</head>

<body>

<div class="box">

<h1>💖 مفاجأة لرويدا 💖</h1>

<p>المفاجأة ستظهر بعد:</p>

<div id="countdown">20</div>

<div id="message"></div>

</div>

<script>

let seconds = 20;

const timer = setInterval(function(){

document.getElementById("countdown").innerHTML = seconds + " ثانية";

seconds--;

if(seconds < 0){

clearInterval(timer);

document.getElementById("countdown").innerHTML = "🎉";

document.getElementById("message").innerHTML =
"🌹 صباح الخير يا رويدا ❤️<br><br>أردت أن أكون أول شخص يرسم الابتسامة على وجهك اليوم.<br><br>أتمنى أن يكون يومك جميلًا بقدر جمال قلبك. 🤍";

}

},1000);

</script>

</body>
</html>
