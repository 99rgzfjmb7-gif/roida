<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفاجأة لرويدا ❤️</title>

<style>
body{
margin:0;
padding:0;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
text-align:center;
}

.box{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.2);
width:85%;
max-width:400px;
}

button{
background:#ff4d88;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:12px;
cursor:pointer;
}

#message{
margin-top:20px;
font-size:20px;
color:#444;
}
</style>

</head>

<body>

<div class="box">

<h1>💖 مفاجأة لرويدا 💖</h1>

<p>اضغطي الزر لتبدأ المفاجأة</p>

<button onclick="love()">
ابدئي ❤️
</button>

<div id="message"></div>

</div>

<script>

function love(){

document.getElementById("message").innerHTML=

"🌹 صباح الخير يا رويدا ❤️ <br><br>أردت أن أكون أول شخص يرسم الابتسامة على وجهك اليوم.<br><br>أتمنى أن يكون يومك جميلًا بقدر جمال قلبك. 🤍";

}

</script>

</body>
</html>
